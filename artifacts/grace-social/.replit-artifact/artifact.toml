kind = "mobile"
previewPath = "/"
title = "Grace Social"
version = "1.0.0"
id = "artifacts/grace-social"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 18396

[services.development]
run = "pnpm --filter @workspace/grace-social run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/grace-social", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/grace-social", "run", "serve" ]

[services.env]
PORT = "18396"
BASE_PATH = "/"
